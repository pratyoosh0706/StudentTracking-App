app = "student-admin-server"
primary_region = "sin"

[build]
  builder = "heroku/buildpacks:20"

[env]
  PORT = "5000"

[[services]]
  protocol = "tcp"
  internal_port = 5000

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
